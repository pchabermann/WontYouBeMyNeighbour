{{- if .Values.controller.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: asi-system
  labels:
    app.kubernetes.io/name: asi-platform
    app.kubernetes.io/component: system
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

{{- if .Values.observability.enabled }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.observability.namespace }}
  labels:
    app.kubernetes.io/name: asi-platform
    app.kubernetes.io/component: observability
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
