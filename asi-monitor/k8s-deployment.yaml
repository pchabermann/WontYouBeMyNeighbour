---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: asi-monitor
  namespace: asi-system
  labels:
    app.kubernetes.io/name: asi-monitor
    app.kubernetes.io/component: monitor
    app.kubernetes.io/part-of: asi-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: asi-monitor
rules:
# Read namespaces (list topology-* namespaces) + delete for stop
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "delete"]
# Read pods and logs
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
# Read services and configmaps
- apiGroups: [""]
  resources: ["services", "configmaps"]
  verbs: ["get", "list", "watch"]
# Read NADs for link info
- apiGroups: ["k8s.cni.cncf.io"]
  resources: ["network-attachment-definitions"]
  verbs: ["get", "list", "watch"]
# Read AgentTopology CRs
- apiGroups: ["asi.asi.anthropic.com"]
  resources: ["agenttopologies"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: asi-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: asi-monitor
subjects:
- kind: ServiceAccount
  name: asi-monitor
  namespace: asi-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asi-monitor
  namespace: asi-system
  labels:
    app.kubernetes.io/name: asi-monitor
    app.kubernetes.io/component: monitor
    app.kubernetes.io/part-of: asi-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asi-monitor
  template:
    metadata:
      labels:
        app: asi-monitor
    spec:
      serviceAccountName: asi-monitor
      containers:
      - name: monitor
        image: asi-monitor:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 8001
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /api/wizard/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/wizard/health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: asi-monitor
  namespace: asi-system
  labels:
    app.kubernetes.io/name: asi-monitor
    app.kubernetes.io/component: monitor
    app.kubernetes.io/part-of: asi-platform
spec:
  type: ClusterIP
  selector:
    app: asi-monitor
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
