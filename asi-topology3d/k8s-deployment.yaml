---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: asi-topology3d
  namespace: asi-system
  labels:
    app.kubernetes.io/name: asi-topology3d
    app.kubernetes.io/component: topology3d
    app.kubernetes.io/part-of: asi-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: asi-topology3d
rules:
# Read namespaces (list topology-* namespaces)
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
# Read pods
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Read services and configmaps
- apiGroups: [""]
  resources: ["services", "configmaps"]
  verbs: ["get", "list", "watch"]
# Read NADs for link discovery
- apiGroups: ["k8s.cni.cncf.io"]
  resources: ["network-attachment-definitions"]
  verbs: ["get", "list", "watch"]
# Read AgentTopology CRs
- apiGroups: ["asi.asi.anthropic.com"]
  resources: ["agenttopologies"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: asi-topology3d
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: asi-topology3d
subjects:
- kind: ServiceAccount
  name: asi-topology3d
  namespace: asi-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asi-topology3d
  namespace: asi-system
  labels:
    app.kubernetes.io/name: asi-topology3d
    app.kubernetes.io/component: topology3d
    app.kubernetes.io/part-of: asi-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asi-topology3d
  template:
    metadata:
      labels:
        app: asi-topology3d
    spec:
      serviceAccountName: asi-topology3d
      containers:
      - name: topology3d
        image: asi-topology3d:latest
        imagePullPolicy: Never
        ports:
        - name: http
          containerPort: 8002
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /api/wizard/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/wizard/health
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: asi-topology3d
  namespace: asi-system
  labels:
    app.kubernetes.io/name: asi-topology3d
    app.kubernetes.io/component: topology3d
    app.kubernetes.io/part-of: asi-platform
spec:
  type: ClusterIP
  selector:
    app: asi-topology3d
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
