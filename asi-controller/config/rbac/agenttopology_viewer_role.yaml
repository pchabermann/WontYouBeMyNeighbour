# This rule is not used by the project asi-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to asi.asi.anthropic.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: asi-controller
    app.kubernetes.io/managed-by: kustomize
  name: agenttopology-viewer-role
rules:
- apiGroups:
  - asi.asi.anthropic.com
  resources:
  - agenttopologies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - asi.asi.anthropic.com
  resources:
  - agenttopologies/status
  verbs:
  - get
