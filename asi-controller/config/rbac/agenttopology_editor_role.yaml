# This rule is not used by the project asi-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the asi.asi.anthropic.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: asi-controller
    app.kubernetes.io/managed-by: kustomize
  name: agenttopology-editor-role
rules:
- apiGroups:
  - asi.asi.anthropic.com
  resources:
  - agenttopologies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - asi.asi.anthropic.com
  resources:
  - agenttopologies/status
  verbs:
  - get
