---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: agenttopologies.asi.asi.anthropic.com
spec:
  group: asi.asi.anthropic.com
  names:
    kind: AgentTopology
    listKind: AgentTopologyList
    plural: agenttopologies
    shortNames:
    - atopo
    - atopology
    singular: agenttopology
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.namespace
      name: Namespace
      type: string
    - description: Number of agents
      jsonPath: .spec.agents[*].name
      name: Agents
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentTopology is the Schema for the agenttopologies API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of AgentTopology
            properties:
              agents:
                description: Agents defines the network agents in this topology
                items:
                  description: AgentSpec defines a single network agent
                  properties:
                    image:
                      description: Image specifies the container image for this agent
                        (optional, uses default if not set)
                      type: string
                    interfaces:
                      description: Interfaces defines the network interfaces on this
                        agent
                      items:
                        description: InterfaceConfig defines a network interface
                        properties:
                          addresses:
                            description: Addresses lists the IP addresses assigned
                              to this interface
                            items:
                              type: string
                            type: array
                          mtu:
                            description: MTU is the maximum transmission unit
                            format: int32
                            maximum: 9216
                            minimum: 576
                            type: integer
                          name:
                            description: Name is the interface name (eth0, eth1, lo,
                              etc.)
                            pattern: ^[a-z0-9]+$
                            type: string
                          type:
                            description: Type is the interface type (ethernet, loopback)
                            enum:
                            - ethernet
                            - loopback
                            type: string
                        required:
                        - name
                        - type
                        type: object
                      minItems: 1
                      type: array
                    llm:
                      description: LLM defines the LLM configuration for this agent
                      properties:
                        model:
                          description: Model is the LLM model to use (claude-sonnet-4,
                            claude-opus-4, etc.)
                          type: string
                        profile:
                          description: Profile is the system prompt/persona for this
                            agent
                          type: string
                        temperature:
                          description: Temperature controls randomness in responses
                            (0.0-1.0, serialized as string)
                          pattern: ^0\.[0-9]+$|^1\.0+$
                          type: string
                      required:
                      - model
                      type: object
                    mcpServers:
                      description: MCPServers lists the MCP servers this agent should
                        connect to
                      items:
                        type: string
                      type: array
                    name:
                      description: Name is the unique identifier for this agent
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    protocols:
                      description: Protocols defines the routing protocols enabled
                        on this agent
                      items:
                        description: ProtocolConfig defines configuration for a routing
                          protocol
                        properties:
                          config:
                            additionalProperties:
                              type: string
                            description: |-
                              Config contains protocol-specific configuration as key-value pairs
                              For OSPF: area, routerId, helloInterval, deadInterval, etc.
                              For BGP: asn, routerId, neighbors, etc.
                              For IS-IS: level, areaAddress, etc.
                            type: object
                          type:
                            description: Type is the protocol type (ospf, bgp, isis)
                            enum:
                            - ospf
                            - bgp
                            - isis
                            type: string
                        required:
                        - type
                        type: object
                      type: array
                    resources:
                      description: Resources defines compute resource requirements
                      properties:
                        cpuLimit:
                          description: CPU limit in millicores
                          type: string
                        cpuRequest:
                          description: CPU request in millicores
                          type: string
                        memoryLimit:
                          description: Memory limit (e.g., "512Mi", "2Gi")
                          type: string
                        memoryRequest:
                          description: Memory request (e.g., "256Mi", "1Gi")
                          type: string
                      type: object
                  required:
                  - interfaces
                  - name
                  type: object
                minItems: 1
                type: array
              links:
                description: Links defines the point-to-point links between agents
                items:
                  description: LinkSpec defines a point-to-point link between two
                    agents
                  properties:
                    endpoints:
                      description: Endpoints defines the two agent interfaces connected
                        by this link
                      items:
                        description: LinkEndpoint defines one end of a link
                        properties:
                          agent:
                            description: Agent is the name of the agent
                            type: string
                          interface:
                            description: Interface is the name of the interface on
                              the agent
                            type: string
                        required:
                        - agent
                        - interface
                        type: object
                      maxItems: 2
                      minItems: 2
                      type: array
                    mtu:
                      description: MTU is the maximum transmission unit for this link
                      format: int32
                      maximum: 9216
                      minimum: 576
                      type: integer
                    name:
                      description: Name is the unique identifier for this link
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    subnet:
                      description: Subnet is the IPv6 subnet for SLAAC on this link
                        (e.g., "fd00:0:1::/64")
                      type: string
                  required:
                  - endpoints
                  - name
                  type: object
                type: array
            required:
            - agents
            type: object
          status:
            description: status defines the observed state of AgentTopology
            properties:
              agentStatuses:
                description: AgentStatuses tracks the status of each agent in the
                  topology
                items:
                  description: AgentStatus represents the status of a single agent
                  properties:
                    dashboardURL:
                      description: DashboardURL is the HTTP URL to access the agent's
                        dashboard
                      type: string
                    message:
                      description: Message contains a human-readable message about
                        the agent status
                      type: string
                    name:
                      description: Name is the agent name
                      type: string
                    phase:
                      description: Phase represents the current phase of the agent
                      enum:
                      - Pending
                      - Running
                      - Failed
                      - Unknown
                      type: string
                    podName:
                      description: PodName is the Kubernetes pod name for this agent
                      type: string
                    ready:
                      description: Ready indicates if the agent is ready to serve
                        traffic
                      type: boolean
                  required:
                  - name
                  type: object
                type: array
              conditions:
                description: |-
                  Conditions represent the current state of the AgentTopology resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              namespace:
                description: Namespace is the Kubernetes namespace created for this
                  topology
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation of the most
                  recently observed AgentTopology
                format: int64
                type: integer
              phase:
                description: Phase represents the overall phase of the topology
                enum:
                - Pending
                - Creating
                - Running
                - Failed
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
